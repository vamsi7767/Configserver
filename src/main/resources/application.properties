# Config Server runs on port 8888
server.port=8888

# Point to your Git repository that stores service configs
spring.cloud.config.server.git.uri=https://github.com/your-org/config-repo

 

# (Optional) Specify default branch
spring.cloud.config.server.git.default-label=main

# Enable fail-fast so services stop if config server is unreachable
spring.cloud.config.fail-fast=true

# Logging level for debugging
logging.level.org.springframework.cloud=DEBUG